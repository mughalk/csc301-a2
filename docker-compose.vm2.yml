# docker-compose for VM2 (10.128.2.113)
# ISCS :14000  →  UserService/ProductService on VM3 (10.128.3.113)
#
# Usage:
#   docker-compose -f docker-compose.vm2.yml up --build -d

version: '3.3'

services:
  iscs:
    build: .
    command: ["java", "-cp", "compiled:lib/*", "ISCS.ISCS", "config.json"]
    ports:
      - "14000:14000"
    volumes:
      - ./config.distributed.json:/app/config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:14000/user/0"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped
