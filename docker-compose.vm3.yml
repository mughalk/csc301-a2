# docker-compose for VM3 (10.128.3.113)
# UserService :8081 + ProductService :8082
# DB: PostgreSQL on VM4 (10.128.4.113:5432)
#
# Usage:
#   docker-compose -f docker-compose.vm3.yml up --build -d

version: '3.3'

services:
  userservice:
    build: .
    command: ["java", "-cp", "compiled:lib/*", "UserService.UserService", "config.json"]
    ports:
      - "8081:8081"
    volumes:
      - ./config.vm3.json:/app/config.json:ro
    environment:
      DB_URL: jdbc:postgresql://10.128.4.113:5432/a2db
      DB_USER: a2user
      DB_PASS: a2pass
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/user/0"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  productservice:
    build: .
    command: ["java", "-cp", "compiled:lib/*", "ProductService.ProductService", "config.json"]
    ports:
      - "8082:8082"
    volumes:
      - ./config.vm3.json:/app/config.json:ro
    environment:
      DB_URL: jdbc:postgresql://10.128.4.113:5432/a2db
      DB_USER: a2user
      DB_PASS: a2pass
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/product/0"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped
