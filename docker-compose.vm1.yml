# docker-compose for VM1 (10.128.1.113)
# OrderService :8080  ← only externally-reachable port
# ISCS on VM2 (10.128.2.113:14000)
# DB:  PostgreSQL on VM4 (10.128.4.113:5432)
#
# Usage:
#   docker compose -f docker-compose.vm1.yml up --build -d

version: '3.8'

services:
  orderservice:
    build: .
    command: ["java", "-cp", "compiled:lib/*", "OrderService.OrderService", "config.json"]
    network_mode: host
    volumes:
      - ./config.distributed.json:/app/config.json:ro
    environment:
      DB_URL: jdbc:postgresql://10.128.4.113:5432/a2db
      DB_USER: a2user
      DB_PASS: a2pass
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/user/0"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped
