services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: a2db
      POSTGRES_USER: a2user
      POSTGRES_PASSWORD: a2pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2user -d a2db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  userservice:
    build: .
    command: ["java", "-cp", "compiled:lib/*", "UserService.UserService", "config.json"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/a2db
      DB_USER: a2user
      DB_PASS: a2pass
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8081/user/0"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  productservice:
    build: .
    command: ["java", "-cp", "compiled:lib/*", "ProductService.ProductService", "config.json"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/a2db
      DB_USER: a2user
      DB_PASS: a2pass
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8082/product/0"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  iscs:
    build: .
    command: ["java", "-cp", "compiled:lib/*", "ISCS.ISCS", "config.json"]
    ports:
      - "14000:14000"
    depends_on:
      userservice:
        condition: service_healthy
      productservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:14000/user/0"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  orderservice:
    build: .
    command: ["java", "-cp", "compiled:lib/*", "OrderService.OrderService", "config.json"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/a2db
      DB_USER: a2user
      DB_PASS: a2pass
    ports:
      - "14002:14002"
    depends_on:
      iscs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:14002/user/0"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
